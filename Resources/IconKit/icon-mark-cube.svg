<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- FOREGROUND MARK — the "Contained" isometric container/cube. Three faces in white at
       descending opacity give depth; the channel tint shows through once Icon Composer frosts it.
       No rounding, no glass, no shadow here — Icon Composer applies those. Centered on the canvas
       within the icon safe area (~57% of the 1024 grid). -->
  <g>
    <!-- top face (brightest) -->
    <polygon points="512,222 763,367 512,512 261,367" fill="#FFFFFF"/>
    <!-- left face (mid) -->
    <polygon points="261,367 261,657 512,802 512,512" fill="#FFFFFF" fill-opacity="0.82"/>
    <!-- right face (darkest, for depth) -->
    <polygon points="763,367 763,657 512,802 512,512" fill="#FFFFFF" fill-opacity="0.64"/>
    <!-- crisp edges so the silhouette stays legible at small sizes -->
    <g stroke="#FFFFFF" stroke-opacity="0.30" stroke-width="3" stroke-linejoin="round" fill="none">
      <polygon points="512,222 763,367 512,512 261,367"/>
      <line x1="512" y1="512" x2="512" y2="802"/>
    </g>
  </g>
</svg>
