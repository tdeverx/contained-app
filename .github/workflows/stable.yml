name: Stable

# Builds on every push to `stable`, ad-hoc signs, packages a DMG, publishes a `v<version>` release, and
# regenerates this branch's appcast.xml (the stable channel's feed).
#
# `stable` starts as a basic-files branch with no source — the build steps skip cleanly (green) until
# code is promoted from `beta`/`nightly`. The stable version is the root VERSION file verbatim.
#
# No Apple Developer ID / notarization. Only secret: SPARKLE_ED_PRIVATE_KEY (DMG still ships without it).

on:
  push:
    branches: [stable]
    # Docs/meta-only changes don't need a build. For anything else (e.g. a
    # cleanup under a build path), put [skip ci] in the commit message.
    paths-ignore:
      - '**/*.md'
      - '.github/assets/**'
      - 'LICENSE'
      - 'NOTICE'
      - '.gitignore'
  workflow_dispatch:

concurrency:
  group: stable
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  stable:
    runs-on: macos-26
    env:
      SPARKLE_ED_PRIVATE_KEY: ${{ secrets.SPARKLE_ED_PRIVATE_KEY }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Guard (skip until source is promoted to this branch)
        id: guard
        run: |
          if [ -f Package.swift ]; then echo "build=true" >> "$GITHUB_OUTPUT"; \
          else echo "::notice::No source on stable yet — skipping build."; echo "build=false" >> "$GITHUB_OUTPUT"; fi

      - name: Toolchain
        if: steps.guard.outputs.build == 'true'
        run: swift --version && xcodebuild -version

      - name: Build & test
        if: steps.guard.outputs.build == 'true'
        run: |
          swift build -c release
          swift test

      - name: Bundle (ad-hoc signed) + DMG
        if: steps.guard.outputs.build == 'true'
        run: |
          export VERSION=$(cat VERSION 2>/dev/null || echo 1.0.0)
          SHA=$(git rev-parse --short HEAD)
          CHANNEL=stable ./scripts/bundle.sh release
          mkdir -p updates
          brew install create-dmg
          ./scripts/make-dmg.sh stable Contained.app "updates/Contained-${VERSION}.dmg"
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "SHA=${SHA}" >> "$GITHUB_ENV"

      - name: Publish release
        if: steps.guard.outputs.build == 'true'
        run: |
          gh release create "v${VERSION}" updates/*.dmg \
            --title "Contained ${VERSION}" \
            --notes "Contained ${VERSION} @ ${SHA}.

          ⚠️ Unsigned build — first launch: right-click the app ▸ **Open** (or \`xattr -dr com.apple.quarantine /Applications/Contained.app\`)."

      - name: Update Sparkle feed (stable branch appcast.xml)
        if: steps.guard.outputs.build == 'true' && env.SPARKLE_ED_PRIVATE_KEY != ''
        run: |
          KEYFILE="$(mktemp)"; printf '%s' "$SPARKLE_ED_PRIVATE_KEY" > "$KEYFILE"
          BIN=".build/artifacts/sparkle/Sparkle/bin"
          [ -x "$BIN/generate_appcast" ] || BIN="$(dirname "$(find .build -type f -name generate_appcast | head -1)")"
          ED_KEY_FILE="$KEYFILE" \
            DOWNLOAD_PREFIX="https://github.com/tdeverx/contained-app/releases/download/v${VERSION}/" \
            ./scripts/appcast.sh "$BIN" updates
          rm -f "$KEYFILE"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add appcast.xml
          if git diff --cached --quiet; then
            echo "appcast unchanged — nothing to commit."
          else
            git commit -m "ci: stable appcast (v${VERSION})"
            git push origin HEAD:stable
          fi
