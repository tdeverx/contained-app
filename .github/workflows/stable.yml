name: Stable

# Builds on every push to `stable`, ad-hoc signs, packages a DMG, publishes a `v<version>` release, and
# regenerates this branch's appcast.xml (the stable channel's feed), and merges the promoted stable
# item into the nightly appcast so Nightly users can receive finished releases too.
#
# `stable` starts as a basic-files branch with no source — the build steps skip cleanly (green) until
# code is promoted from `beta`/`nightly`. The stable marketing version is the root VERSION file
# verbatim; the build number is retained from the promoted nightly commit when possible.
#
# No Apple Developer ID / notarization. Only secret: SPARKLE_ED_PRIVATE_KEY (DMG still ships without it).

on:
  push:
    branches: [stable]
    # Docs/meta-only changes don't need a build. Changelog changes do, because the changelog is
    # bundled into the app and drives GitHub/Sparkle release notes.
    paths-ignore:
      - 'docs/**'
      - 'README.md'
      - 'CODE_OF_CONDUCT.md'
      - '.github/CONTRIBUTING.md'
      - '.github/assets/**'
      - 'LICENSE'
      - 'NOTICE'
      - '.gitignore'
      - 'appcast.xml'
  workflow_dispatch:

concurrency:
  group: stable
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  stable:
    runs-on: macos-26
    env:
      SPARKLE_ED_PRIVATE_KEY: ${{ secrets.SPARKLE_ED_PRIVATE_KEY }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Guard (skip until source is promoted to this branch)
        id: guard
        run: |
          if [ -f Package.swift ]; then echo "build=true" >> "$GITHUB_OUTPUT"; \
          else echo "::notice::No source on stable yet — skipping build."; echo "build=false" >> "$GITHUB_OUTPUT"; fi

      - name: Toolchain
        if: steps.guard.outputs.build == 'true'
        run: swift --version && xcodebuild -version

      - name: Build & test
        if: steps.guard.outputs.build == 'true'
        run: |
          set -euo pipefail
          ./scripts/ci-validate.sh
          swift build -c release
          swift test

      - name: Bundle (ad-hoc signed) + DMG
        if: steps.guard.outputs.build == 'true'
        run: |
          set -euo pipefail
          git fetch origin nightly:refs/remotes/origin/nightly
          SHA=$(CHANNEL=stable ./scripts/version-info.sh sha)
          BUILD=$(CHANNEL=stable BUILD_SOURCE_REF=origin/nightly SHA="${SHA}" ./scripts/version-info.sh build)
          VERSION=$(CHANNEL=stable BUILD="${BUILD}" SHA="${SHA}" ./scripts/version-info.sh version)
          export BUILD SHA VERSION
          {
            echo "BASE_VERSION=$(./scripts/version-info.sh base)"
            echo "BUILD=${BUILD}"
            echo "SHA=${SHA}"
            echo "VERSION=${VERSION}"
          } >> "$GITHUB_ENV"
          CHANNEL=stable BUILD="${BUILD}" VERSION="${VERSION}" ./scripts/bundle.sh release
          mkdir -p updates
          brew install create-dmg
          ./scripts/make-dmg.sh stable Contained.app "updates/Contained-${VERSION}.dmg"
          CHANNEL=stable VERSION_VALUE="${VERSION}" ./scripts/release-body.sh > updates/release-notes.md
          {
            echo "Contained ${VERSION} @ ${SHA}."
            echo
            cat updates/release-notes.md
            echo
            echo "⚠️ Unsigned build — first launch: right-click the app ▸ **Open** (or \`xattr -dr com.apple.quarantine /Applications/Contained.app\`)."
          } > updates/github-release-notes.md

      - name: Publish release
        if: steps.guard.outputs.build == 'true'
        run: |
          set -euo pipefail
          tag="v${VERSION}"
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" updates/*.dmg --clobber
            gh release edit "$tag" \
              --title "Contained ${VERSION}" \
              --notes-file updates/github-release-notes.md
          else
            gh release create "$tag" updates/*.dmg \
              --title "Contained ${VERSION}" \
              --notes-file updates/github-release-notes.md
          fi

      - name: Update Sparkle feed (stable branch appcast.xml)
        if: steps.guard.outputs.build == 'true' && env.SPARKLE_ED_PRIVATE_KEY != ''
        run: |
          set -euo pipefail
          KEYFILE="$(mktemp)"; printf '%s' "$SPARKLE_ED_PRIVATE_KEY" > "$KEYFILE"
          BIN=".build/artifacts/sparkle/Sparkle/bin"
          [ -x "$BIN/generate_appcast" ] || BIN="$(dirname "$(find .build -type f -name generate_appcast | head -1)")"
          ED_KEY_FILE="$KEYFILE" \
            DOWNLOAD_PREFIX="https://github.com/tdeverx/contained-app/releases/download/v${VERSION}/" \
            ./scripts/appcast.sh "$BIN" updates
          rm -f "$KEYFILE"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add appcast.xml
          if git diff --cached --quiet; then
            echo "appcast unchanged — nothing to commit."
          else
            git commit -m "ci: stable appcast (v${VERSION}) [skip ci]"
            git push origin HEAD:stable
          fi

          PROMOTED_APPCAST="$(mktemp)"
          cp appcast.xml "$PROMOTED_APPCAST"
          git fetch origin nightly:refs/remotes/origin/nightly
          NIGHTLY_WORKTREE="$(mktemp -d)"
          rm -rf "$NIGHTLY_WORKTREE"
          git worktree add "$NIGHTLY_WORKTREE" origin/nightly
          ./scripts/promote-appcast-to-nightly.sh "$PROMOTED_APPCAST" "$NIGHTLY_WORKTREE/appcast.xml"
          (
            cd "$NIGHTLY_WORKTREE"
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add appcast.xml
            if git diff --cached --quiet; then
              echo "nightly appcast already contains stable item."
            else
              git commit -m "ci: include stable appcast item (v${VERSION}) [skip ci]"
              git push origin HEAD:nightly
            fi
          )
          git worktree remove "$NIGHTLY_WORKTREE" --force
          rm -f "$PROMOTED_APPCAST"
