name: Nightly

# Builds the latest green `main`, ad-hoc signs, packages a DMG, EdDSA-signs the Sparkle appcast, and
# publishes the rolling `nightly` pre-release. No Apple Developer ID / notarization (no paid account
# needed) — Sparkle's own EdDSA signature is the update-integrity boundary. First launch of an
# unsigned build needs right-click ▸ Open (Gatekeeper).
#
# Only secret required for auto-updates: SPARKLE_ED_PRIVATE_KEY (from `generate_keys -x`). Without it
# the DMG is still published for manual download; the appcast just isn't (re)signed.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: nightly
  cancel-in-progress: true   # only the newest commit builds

permissions:
  contents: write            # update the rolling release + commit the appcast

jobs:
  nightly:
    runs-on: macos-26        # GA, arm64 (Apple silicon) — ships Xcode 26
    env:
      SPARKLE_ED_PRIVATE_KEY: ${{ secrets.SPARKLE_ED_PRIVATE_KEY }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v7        # Node 24
        with:
          fetch-depth: 0                 # full history → monotonic build number

      - name: Toolchain
        run: swift --version && xcodebuild -version

      - name: Build & test
        run: |
          swift build -c release
          swift test

      - name: Bundle (ad-hoc signed) + DMG
        run: |
          BUILD=$(git rev-list --count HEAD)
          SHA=$(git rev-parse --short HEAD)
          export VERSION="1.0.0-nightly.${BUILD}+${SHA}"
          ./scripts/bundle.sh release
          mkdir -p updates
          hdiutil create -volname Contained -srcfolder Contained.app -ov -format UDZO \
            "updates/Contained-${VERSION}.dmg"
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "SHA=${SHA}" >> "$GITHUB_ENV"

      - name: Publish rolling nightly release
        run: |
          gh release delete nightly --yes --cleanup-tag || true
          gh release create nightly updates/*.dmg \
            --prerelease --title "Nightly (${VERSION})" \
            --notes "Automated build of \`main\` @ ${SHA}.

          ⚠️ Unsigned build — first launch: right-click the app ▸ **Open** (or \`xattr -dr com.apple.quarantine /Applications/Contained.app\`)."

      - name: Sign appcast (Sparkle) + commit
        if: env.SPARKLE_ED_PRIVATE_KEY != ''
        run: |
          printf '%s' "$SPARKLE_ED_PRIVATE_KEY" > "$RUNNER_TEMP/sparkle_key"
          BIN=.build/artifacts/sparkle/Sparkle/bin
          [ -x "$BIN/generate_appcast" ] || BIN="$(dirname "$(find .build -type f -name generate_appcast | head -1)")"
          "$BIN/generate_appcast" --ed-key-file "$RUNNER_TEMP/sparkle_key" \
            --download-url-prefix "https://github.com/tdeverx/contained-app/releases/download/nightly/" \
            updates
          rm -f "$RUNNER_TEMP/sparkle_key"
          # Tag the item for the `nightly` channel so only nightly-channel users are offered it
          # (the EdDSA signature lives on the enclosure, so editing the item body is safe).
          python3 -c 'p="updates/appcast.xml"; s=open(p).read(); open(p,"w").write(s if "<sparkle:channel>" in s else s.replace("<item>","<item><sparkle:channel>nightly</sparkle:channel>",1))'
          mkdir -p docs && cp updates/appcast.xml docs/appcast.xml
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/appcast.xml
          git commit -m "ci: nightly appcast ${VERSION}" || true
          git push || true

      - name: No Sparkle key — auto-update skipped
        if: env.SPARKLE_ED_PRIVATE_KEY == ''
        run: echo "::notice::SPARKLE_ED_PRIVATE_KEY not set — published the DMG, but skipped appcast signing. Set that one secret to enable in-app auto-updates."
