name: Release

# Manual stable/beta release: build → ad-hoc sign → DMG → tagged GitHub release.
# Same no-dev-account approach as nightly (no Developer ID / notarization).
#
# NOTE: this publishes a downloadable tagged DMG. Wiring stable/beta items into the single
# Sparkle appcast (merging with the nightly channel) is future work — until then the nightly
# workflow owns docs/appcast.xml.

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Marketing version, e.g. 1.0.0 or 1.0.0-beta.1"
        required: true
      prerelease:
        description: "Mark as a GitHub pre-release (beta)"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-26
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Toolchain
        run: swift --version && xcodebuild -version

      - name: Build & test
        run: |
          swift build -c release
          swift test

      - name: Bundle (ad-hoc signed) + DMG
        env:
          VERSION: ${{ inputs.version }}
        run: |
          ./scripts/bundle.sh release
          mkdir -p updates
          hdiutil create -volname Contained -srcfolder Contained.app -ov -format UDZO \
            "updates/Contained-${VERSION}.dmg"

      - name: Publish release
        env:
          VERSION: ${{ inputs.version }}
        run: |
          PRE=""; [ "${{ inputs.prerelease }}" = "true" ] && PRE="--prerelease"
          gh release create "v${VERSION}" updates/*.dmg $PRE \
            --title "Contained ${VERSION}" \
            --notes "Contained ${VERSION}.

          ⚠️ Unsigned build — first launch: right-click the app ▸ **Open** (or \`xattr -dr com.apple.quarantine /Applications/Contained.app\`)."
